name: Build Universal libmpv for macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Prerequisit
        run: |
          brew install automake autoconf libtool pkg-config coreutils wget python3 meson ninja fribidi harfbuzz

      - name: Clone mpv-build & Write Options
        run: |
          git clone https://github.com/mpv-player/mpv-build.git
          cd mpv-build
          ./use-mpv-master
          ./use-ffmpeg-master
          ./use-libass-master

          printf '%s\n' \
            '-Dlibmpv=true' \
            '-Dcplayer=false' \
            '-Dswift-build=disabled' \
            '-Dcocoa=disabled' \
            '-Dmacos-cocoa-cb=disabled' \
            '-Dmacos-media-player=disabled' \
            '-Dmacos-touchbar=disabled' \
            > mpv_options

          printf '%s\n' \
            '--disable-shared' \
            '--enable-static' \
            '--disable-programs' \
            '--disable-doc' \
            > ffmpeg_options

          printf '%s\n' \
            '--disable-shared' \
            '--enable-static' \
            > libass_options

          echo "=== mpv_options ===" && cat mpv_options
          echo "=== ffmpeg_options ===" && cat ffmpeg_options
          echo "=== libass_options ===" && cat libass_options

          ./update

      - name: Build arm64 Slice
        run: |
          cd mpv-build
          ./clean
          rm -rf mpv/build build_libs

          export CFLAGS="-arch arm64"
          export CXXFLAGS="-arch arm64"
          export LDFLAGS="-arch arm64"
          ./build -j$(sysctl -n hw.logicalcpu)

          grep -q "HAVE_COCOA" mpv/build/build.ninja && echo "ERROR: Cocoa still enabled!" && exit 1 || echo "OK: Cocoa disabled"

          mkdir -p ../dist/arm64
          cp mpv/build/libmpv.dylib ../dist/arm64/libmpv.dylib

      - name: Upload arm64 Slice
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-arm64
          path: dist/arm64/libmpv.dylib

  build-x86_64:
    runs-on: macos-13
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Prerequisites
        run: |
          brew install automake autoconf libtool pkg-config coreutils wget python3 meson ninja fribidi harfbuzz

      - name: Clone mpv-build & Write Options
        run: |
          git clone https://github.com/mpv-player/mpv-build.git
          cd mpv-build
          ./use-mpv-master
          ./use-ffmpeg-master
          ./use-libass-master

          printf '%s\n' \
            '-Dlibmpv=true' \
            '-Dcplayer=false' \
            '-Dswift-build=disabled' \
            '-Dcocoa=disabled' \
            '-Dmacos-cocoa-cb=disabled' \
            '-Dmacos-media-player=disabled' \
            '-Dmacos-touchbar=disabled' \
            > mpv_options

          printf '%s\n' \
            '--disable-shared' \
            '--enable-static' \
            '--disable-programs' \
            '--disable-doc' \
            > ffmpeg_options

          printf '%s\n' \
            '--disable-shared' \
            '--enable-static' \
            > libass_options

          echo "=== mpv_options ===" && cat mpv_options
          echo "=== ffmpeg_options ===" && cat ffmpeg_options
          echo "=== libass_options ===" && cat libass_options

          ./update

      - name: Build x86_64 Slice
        run: |
          cd mpv-build
          ./clean
          rm -rf mpv/build build_libs

          ./build -j$(sysctl -n hw.logicalcpu)

          grep -q "HAVE_COCOA" mpv/build/build.ninja && echo "ERROR: Cocoa still enabled!" && exit 1 || echo "OK: Cocoa disabled"

          mkdir -p ../dist/x86_64
          cp mpv/build/libmpv.dylib ../dist/x86_64/libmpv.dylib

      - name: Upload x86_64 Slice
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-x86_64
          path: dist/x86_64/libmpv.dylib

  assemble:
    needs: [build-arm64, build-x86_64]
    runs-on: macos-latest
    steps:
      - name: Download Slices
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble Universal Binary
        run: |
          lipo -create \
            -output dist/libmpv.dylib \
            dist/libmpv-arm64/libmpv.dylib \
            dist/libmpv-x86_64/libmpv.dylib

          install_name_tool -id "@rpath/libmpv.dylib" dist/libmpv.dylib

          xattr -cr dist/libmpv.dylib
          codesign --force -s - dist/libmpv.dylib

          lipo -archs dist/libmpv.dylib

          otool -L dist/libmpv.dylib | grep -E "libav|libsw|libass" \
            && echo "FAIL: external deps found" && exit 1 \
            || echo "OK: self-contained"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/libmpv.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}name: Build Universal libmpv for macOS

