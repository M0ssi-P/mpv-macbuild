name: Build Universal libmpv for macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Build Prerequisites
        run: |
          brew install automake autoconf libtool pkg-config coreutils wget python3 meson ninja fribidi harfbuzz

      - name: Clone mpv-build Tree
        run: |
          git clone https://github.com/mpv-player/mpv-build.git
          cd mpv-build

          ./use-mpv-master
          ./use-ffmpeg-master
          ./use-libass-master
          
          # Configure libmpv dynamic compilation
          echo --enable-libmpv >> mpv-options

          echo -Dswift-build=disabled >> mpv-options
          
          # 3. Disable the standalone CLI player executable (only build the library context)
          echo -Dcplayer=false >> mpv-options
          
          # Force dependencies to stitch themselves strictly as static modules
          echo --disable-shared >> ffmpeg-options
          echo --enable-static >> ffmpeg-options
          echo --disable-shared >> libass-options
          echo --enable-static >> libass-options
          
          ./update

      - name: Compile Apple Silicon Slice (arm64)
        run: |
          cd mpv-build
          ./clean
          export CFLAGS="-arch arm64"
          export LDFLAGS="-arch arm64"
          ./build -j4
          
          mkdir -p ../dist/arm64
          cp mpv/build/libmpv.dylib ../dist/arm64/libmpv.dylib

      - name: Compile Intel Slice (x86_64)
        run: |
          cd mpv-build
          ./clean
          export CFLAGS="-arch x86_64"
          export LDFLAGS="-arch x86_64"
          ./build -j4
          
          mkdir -p ../dist/x86_64
          cp mpv/build/libmpv.dylib ../dist/x86_64/libmpv.dylib

      - name: Assemble Universal Fat Binary & Apply Signatures
        run: |
          cd dist
          # Stitch them together
          lipo -create -output libmpv.dylib arm64/libmpv.dylib x86_64/libmpv.dylib
          
          # Update the internal shared library identification tag for JVM relative lookups
          install_name_tool -id "@loader_path/libmpv.dylib" libmpv.dylib
          
          # Strip quarantine metadata and force ad-hoc code signature
          xattr -cr libmpv.dylib
          codesign --force -s - libmpv.dylib
          
          # Quick verification check inside the logs
          lipo -archs libmpv.dylib

      - name: Create GitHub Release and Upload Binary Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/libmpv.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}